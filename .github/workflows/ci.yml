name: CI

on:
  push:
    branches: [main, "4.0"]
  pull_request:
    branches: [main, "4.0"]

jobs:
  test-node:
    name: Node ${{ matrix.node-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: ["22", "23"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install SQLite (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install SQLite (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite

      - name: Install GraphQLite (macOS — RFC-0007 happy-path coverage)
        if: runner.os == 'macOS'
        run: brew install graphqlite

      - run: npm install

      - name: Build typecheck (src/)
        run: npx tsc --noEmit -p tsconfig.build.json

      - name: Tests
        run: npx vitest run --reporter=verbose --testTimeout 60000 test/
        env:
          CI: true

  test-bun:
    name: Bun (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install SQLite (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Install SQLite (macOS)
        if: runner.os == 'macOS'
        run: brew install sqlite

      - name: Install GraphQLite (macOS — RFC-0007 happy-path coverage)
        if: runner.os == 'macOS'
        run: brew install graphqlite

      - name: Verify lockfile is up-to-date
        run: bun install --frozen-lockfile

      - name: Tests
        run: bun test --timeout 60000 --preload ./src/test-preload.ts test/
        env:
          CI: true
          DYLD_LIBRARY_PATH: /opt/homebrew/opt/sqlite/lib
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu
