name: Publish

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Verify lockfile is up-to-date
        run: bun install --frozen-lockfile

      - run: bun test --timeout 60000 --preload ./src/test-preload.ts test/
        env:
          CI: true
          LD_LIBRARY_PATH: /usr/lib/x86_64-linux-gnu

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Upgrade npm (≥11.5.1 for OIDC Trusted Publishing)
        run: npm install -g npm@latest

      - run: npm run build
      - name: Publish to npm (via OIDC Trusted Publishing)
        # Pure OIDC — Trusted Publisher entry configured for @agent-ops/qkb
        # on npm pointing at this workflow. Same pattern as @agent-ops/suit.
        # See: https://docs.npmjs.com/trusted-publishers
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$VERSION" == *-* ]]; then
            TAG="${VERSION#*-}"
            TAG="${TAG%%.*}"
            echo "Publishing pre-release ${VERSION} with --tag ${TAG}"
            npm publish --provenance --access public --tag "$TAG"
          else
            echo "Publishing ${VERSION} as latest"
            npm publish --provenance --access public
          fi

      - name: Smoke-install from registry
        run: |
          # Wait for the freshly-published version to be installable.
          # npm registry can lag a few seconds after publish completes.
          VERSION="${GITHUB_REF_NAME#v}"
          PKG="$(jq -r .name package.json)"
          for i in 1 2 3 4 5 6; do
            if npm view "${PKG}@${VERSION}" version >/dev/null 2>&1; then
              echo "✓ ${PKG}@${VERSION} visible on registry"
              break
            fi
            echo "Attempt $i: not yet on registry, sleeping 10s…"
            sleep 10
          done

          # Install into a clean temp dir and run the binary.
          SMOKE_DIR=$(mktemp -d)
          cd "$SMOKE_DIR"
          npm init -y >/dev/null
          npm install --no-fund --no-audit "${PKG}@${VERSION}"
          BIN="$(node -p "require('path').join(require.resolve('${PKG}/package.json').replace(/package\.json$/, ''), require('${PKG}/package.json').bin.qkb)")"
          # Sanity-check: --help should print and exit 0.
          node "$BIN" --help | head -5

      - name: Extract release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES=$(./scripts/extract-changelog.sh "$VERSION")
          # Write to file for gh release (avoids quoting issues)
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create GitHub release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file /tmp/release-notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
